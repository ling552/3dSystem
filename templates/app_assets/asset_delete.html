{% extends 'base.html' %}

{% block title %}删除模型{% endblock %}

{% block content %}
  <h1>删除模型</h1>

  <div class="card" style="max-width: 560px;">
    <p>确认删除：<strong>{{ asset.name }}</strong>？</p>
    <form method="post" class="actions">
      {% csrf_token %}
      <button type="submit" class="btn danger">确认删除</button>
      <a class="btn secondary" href="/assets/">取消</a>
    </form>
  </div>
{% endblock %}
