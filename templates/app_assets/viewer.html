{% extends 'base.html' %}

{% block title %}查看器 - {{ asset.name }}{% endblock %}

{% block content %}
  <div class="viewer-top">
    <a class="navbtn navbtn-secondary" href="/assets/">
      <span class="navicon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      返回列表
    </a>
    <div class="viewer-title">{{ asset.name }}</div>
    <div class="viewer-actions">
      <a class="btn small secondary" href="/assets/{{ asset.id }}/download/">下载</a>
      <button id="resetBtn" class="btn small">重置视角</button>
    </div>
  </div>

  <div class="viewer-layout">
    <div class="viewer-canvas-wrap">
      <div id="overlay" class="overlay">正在加载...</div>
      <button id="fullscreenBtn" type="button" class="viewer-fs-btn" aria-label="全屏预览" title="全屏预览">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 3H5a2 2 0 0 0-2 2v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M16 3h3a2 2 0 0 1 2 2v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M8 21H5a2 2 0 0 1-2-2v-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M16 21h3a2 2 0 0 0 2-2v-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        <span class="viewer-fs-text">全屏</span>
      </button>
      <canvas id="c"></canvas>
    </div>
    <aside class="viewer-side card">
      <div><strong>进度：</strong><span id="progress">0%</span></div>
      <div class="muted" style="margin-top: 8px; word-break: break-all;">
        模型地址：{{ model_url }}
      </div>
    </aside>
  </div>

  {{ model_url|json_script:"model-url" }}

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const modelUrlValue = JSON.parse(document.getElementById('model-url').textContent);

    const canvas = document.getElementById('c');
    const overlay = document.getElementById('overlay');
    const progressEl = document.getElementById('progress');
    const resetBtn = document.getElementById('resetBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const canvasWrap = document.querySelector('.viewer-canvas-wrap');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd6dbe1);

    const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 1000);
    camera.position.set(2, 1.5, 2);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.enablePan = true;
    controls.mouseButtons = {
      LEFT: THREE.MOUSE.ROTATE,
      MIDDLE: THREE.MOUSE.PAN,
      RIGHT: THREE.MOUSE.DOLLY,
    };

    const hemi = new THREE.HemisphereLight(0xffffff, 0x223344, 1.25);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.35);
    dir.position.set(5, 10, 7);
    scene.add(dir);

    const point1 = new THREE.PointLight(0xffffff, 1.8, 0, 2);
    point1.position.set(2.5, 2.5, 2.5);
    scene.add(point1);

    const point2 = new THREE.PointLight(0xffffff, 0.8, 0, 2);
    point2.position.set(-2.5, 1.8, -2.0);
    scene.add(point2);

    let rootObj = null;
    let defaultCamPos = camera.position.clone();
    let defaultTarget = controls.target.clone();

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const w = Math.max(1, rect.width);
      const h = Math.max(1, rect.height);
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    window.addEventListener('resize', resize);

    function fitCameraToObject(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
      cameraZ *= 1.6;

      camera.position.set(center.x + cameraZ, center.y + cameraZ * 0.4, center.z + cameraZ);
      camera.near = maxDim / 100;
      camera.far = maxDim * 100;
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.update();

      defaultCamPos = camera.position.clone();
      defaultTarget = controls.target.clone();
    }

    const loader = new GLTFLoader();
    loader.load(
      modelUrlValue,
      (gltf) => {
        rootObj = gltf.scene;
        scene.add(rootObj);
        fitCameraToObject(rootObj);
        overlay.textContent = '';
        overlay.style.display = 'none';
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          progressEl.textContent = pct + '%';
          overlay.textContent = '加载中... ' + pct + '%';
        } else {
          overlay.textContent = '加载中...';
        }
      },
      (err) => {
        overlay.style.display = 'block';
        overlay.textContent = '加载失败：' + (err?.message || err);
      }
    );

    resetBtn.addEventListener('click', () => {
      camera.position.copy(defaultCamPos);
      controls.target.copy(defaultTarget);
      controls.update();
    });

    function isFullscreen() {
      return !!document.fullscreenElement;
    }

    async function toggleFullscreen() {
      if (!canvasWrap) return;
      try {
        if (isFullscreen()) {
          await document.exitFullscreen();
        } else {
          await canvasWrap.requestFullscreen();
        }
      } catch (e) {}
    }

    if (fullscreenBtn) {
      fullscreenBtn.addEventListener('click', toggleFullscreen);
    }

    function animate() {
      resize();
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
{% endblock %}
