{% extends 'base.html' %}

{% block title %}登录{% endblock %}

{% block content %}
  <div class="auth-center">
    <div class="auth-card card">
      <h1 class="auth-title">登录</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; justify-content: center;">登录</button>
      </form>
      <div class="auth-links">
        <a class="navbtn navbtn-secondary" href="/register/">注册账号</a>
      </div>
    </div>
  </div>
{% endblock %}
