{% extends 'base.html' %}

{% block title %}修改密码{% endblock %}

{% block content %}
  <div class="auth-center">
    <div class="auth-card card">
      <h1 class="auth-title">修改密码</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; justify-content: center;">保存新密码</button>
      </form>
      <div class="auth-links">
        <a class="navbtn navbtn-secondary" href="/me/">返回个人信息</a>
      </div>
    </div>
  </div>
{% endblock %}
